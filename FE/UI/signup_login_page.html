<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2463eb",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111621",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<title>Việc Làm Mới - Đăng ký &amp; Đăng nhập</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<header class="flex items-center justify-between border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 px-6 md:px-20 py-4 sticky top-0 z-50">
<div class="flex items-center gap-3">
<div class="text-primary">
<span class="material-symbols-outlined text-4xl">work</span>
</div>
<h2 class="text-slate-900 dark:text-white text-xl font-bold leading-tight tracking-tight">Việc Làm Mới</h2>
</div>
<div class="flex items-center gap-4">
<button class="hidden md:flex min-w-[100px] cursor-pointer items-center justify-center rounded-lg h-10 px-4 bg-primary text-white text-sm font-bold transition-all hover:bg-primary/90">
<span>Trang chủ</span>
</button>
<span class="material-symbols-outlined md:hidden text-slate-600 dark:text-slate-300">menu</span>
</div>
</header>
<main class="flex-1 flex items-center justify-center p-4 md:p-10">
<div class="w-full max-w-[1000px] bg-white dark:bg-slate-900 rounded-xl shadow-xl overflow-hidden flex flex-col md:flex-row min-h-[600px]">
<div class="w-full md:w-1/2 p-8 md:p-12 border-b md:border-b-0 md:border-r border-slate-100 dark:border-slate-800">
<div class="mb-8">
<h1 class="text-3xl font-black tracking-tight mb-2">Đăng ký</h1>
<p class="text-slate-500 dark:text-slate-400">Tạo tài khoản mới để bắt đầu ngay</p>
</div>
<div class="mb-6">
<label class="block text-sm font-bold mb-2">Loại tài khoản</label>
<div class="flex h-12 w-full items-center justify-center rounded-xl bg-slate-100 dark:bg-slate-800 p-1">
<label class="flex cursor-pointer h-full grow items-center justify-center rounded-lg px-2 has-[:checked]:bg-white dark:has-[:checked]:bg-slate-700 has-[:checked]:shadow-sm transition-all">
<span class="text-sm font-semibold">Ứng viên</span>
<input checked="" class="invisible w-0" name="account_type" type="radio" value="candidate"/>
</label>
<label class="flex cursor-pointer h-full grow items-center justify-center rounded-lg px-2 has-[:checked]:bg-white dark:has-[:checked]:bg-slate-700 has-[:checked]:shadow-sm transition-all">
<span class="text-sm font-semibold">Doanh nghiệp</span>
<input class="invisible w-0" name="account_type" type="radio" value="employer"/>
</label>
</div>
</div>
<form class="space-y-4">
<div>
<label class="block text-sm font-semibold mb-1">Họ tên</label>
<input class="w-full rounded-lg border-slate-200 dark:border-slate-700 dark:bg-slate-800 focus:ring-primary focus:border-primary" placeholder="Nguyễn Văn A" type="text"/>
</div>
<div>
<label class="block text-sm font-semibold mb-1">Email</label>
<input class="w-full rounded-lg border-slate-200 dark:border-slate-700 dark:bg-slate-800 focus:ring-primary focus:border-primary" placeholder="example@gmail.com" type="email"/>
</div>
<div>
<label class="block text-sm font-semibold mb-1">Số điện thoại</label>
<input class="w-full rounded-lg border-slate-200 dark:border-slate-700 dark:bg-slate-800 focus:ring-primary focus:border-primary" placeholder="0901234567" type="tel"/>
</div>
<div>
<label class="block text-sm font-semibold mb-1">Mật khẩu</label>
<input class="w-full rounded-lg border-slate-200 dark:border-slate-700 dark:bg-slate-800 focus:ring-primary focus:border-primary" placeholder="••••••••" type="password"/>
</div>
<button class="w-full bg-primary text-white font-bold py-3 rounded-lg mt-6 hover:bg-primary/90 transition-colors" type="submit">
                                Đăng ký
                            </button>
</form>
</div>
<div class="w-full md:w-1/2 p-8 md:p-12 bg-slate-50 dark:bg-slate-800/50">
<div class="mb-8">
<h1 class="text-3xl font-black tracking-tight mb-2">Đăng nhập</h1>
<p class="text-slate-500 dark:text-slate-400">Chào mừng bạn quay trở lại</p>
</div>
<form class="space-y-4">
<div>
<label class="block text-sm font-semibold mb-1">Email</label>
<input class="w-full rounded-lg border-slate-200 dark:border-slate-700 dark:bg-slate-800 focus:ring-primary focus:border-primary" placeholder="example@gmail.com" type="email"/>
</div>
<div>
<label class="block text-sm font-semibold mb-1">Mật khẩu</label>
<input class="w-full rounded-lg border-slate-200 dark:border-slate-700 dark:bg-slate-800 focus:ring-primary focus:border-primary" placeholder="••••••••" type="password"/>
</div>
<div class="flex items-center justify-between py-2">
<label class="flex items-center gap-2 cursor-pointer">
<input class="rounded border-slate-300 dark:border-slate-700 text-primary focus:ring-primary" type="checkbox"/>
<span class="text-sm">Ghi nhớ đăng nhập</span>
</label>
<a class="text-sm text-primary font-semibold hover:underline" href="#">Quên mật khẩu?</a>
</div>
<button class="w-full bg-slate-900 dark:bg-primary text-white font-bold py-3 rounded-lg mt-6 hover:opacity-90 transition-opacity" type="submit">
                                Đăng nhập
                            </button>
</form>
<div class="mt-10">
<div class="relative flex py-5 items-center">
<div class="flex-grow border-t border-slate-300 dark:border-slate-700"></div>
<span class="flex-shrink mx-4 text-slate-400 text-sm">Hoặc đăng nhập với</span>
<div class="flex-grow border-t border-slate-300 dark:border-slate-700"></div>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 border border-slate-200 dark:border-slate-700 rounded-lg py-2 hover:bg-white dark:hover:bg-slate-700 transition-colors">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="text-sm font-medium">Google</span>
</button>
<button class="flex items-center justify-center gap-2 border border-slate-200 dark:border-slate-700 rounded-lg py-2 hover:bg-white dark:hover:bg-slate-700 transition-colors">
<svg class="w-5 h-5" fill="#1877F2" viewbox="0 0 24 24">
<path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"></path>
</svg>
<span class="text-sm font-medium">Facebook</span>
</button>
</div>
</div>
</div>
</div>
</main>
<footer class="p-8 text-center text-slate-500 dark:text-slate-400 text-sm">
<p>© 2024 Việc Làm Mới. Tất cả quyền được bảo lưu.</p>
<div class="flex justify-center gap-6 mt-4">
<a class="hover:text-primary transition-colors" href="#">Điều khoản dịch vụ</a>
<a class="hover:text-primary transition-colors" href="#">Chính sách bảo mật</a>
<a class="hover:text-primary transition-colors" href="#">Hỗ trợ</a>
</div>
</footer>
</div>
</div>
</body></html>
